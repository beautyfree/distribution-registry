name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: validate + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install script deps
        working-directory: scripts
        run: bun install --frozen-lockfile || bun install

      - name: Run schema + reachability validation
        run: bun run scripts/validate.ts

      - name: Run tests
        run: bun test tests/

  dedup:
    name: duplicate check (PRs only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install script deps
        working-directory: scripts
        run: bun install --frozen-lockfile || bun install

      - name: Collect changed node files
        id: changed
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Prefer gh pr diff (handles forks + renames cleanly); fall back to
          # git diff against origin/main if the gh call fails for any reason.
          if files=$(gh pr diff "$PR_NUMBER" --name-only 2>/dev/null); then
            :
          else
            git fetch origin main --depth=1 || true
            files=$(git diff --name-only origin/main...HEAD)
          fi
          # Only care about JSON files under nodes/
          filtered=$(printf '%s\n' "$files" | grep -E '^nodes/.*\.json$' || true)
          {
            echo "files<<EOF"
            echo "$filtered"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Changed node files:"
          echo "$filtered"

      - name: Run dedup check
        id: dedup
        run: |
          set -euo pipefail
          files="${{ steps.changed.outputs.files }}"
          if [ -z "$files" ]; then
            echo "OK    no node files changed — skipping dedup." | tee dedup.out
            exit 0
          fi
          # Run dedup-check; non-zero exit means a hard (URL-exact) duplicate.
          if ! bun run scripts/dedup-check.ts $files > dedup.out 2>&1; then
            echo "hard_fail=1" >> "$GITHUB_OUTPUT"
          fi
          cat dedup.out

      - name: Post dedup report as PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ ! -s dedup.out ]; then exit 0; fi
          body=$(printf '### Dedup check\n\n```\n%s\n```\n' "$(cat dedup.out)")
          gh pr comment "$PR_NUMBER" --body "$body" || true

      - name: Fail the job on hard duplicates
        if: steps.dedup.outputs.hard_fail == '1'
        run: |
          echo "Hard duplicate detected — see dedup report above."
          exit 1

  publish-index:
    name: publish index.json
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install script deps
        working-directory: scripts
        run: bun install --frozen-lockfile || bun install
      - name: Regenerate index.json (no fetch — already validated)
        run: bun run scripts/validate.ts --no-fetch
      - name: Commit if index.json changed
        run: |
          if git diff --quiet index.json; then
            echo "index.json unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore: regenerate index.json [skip ci]"
            git push
          fi

  deploy-hook:
    name: notify reader app
    needs: publish-index
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK_URL: ${{ secrets.REGISTRY_DEPLOY_HOOK }}
        run: |
          if [ -z "${HOOK_URL}" ]; then
            echo "REGISTRY_DEPLOY_HOOK secret not set — skipping."
            exit 0
          fi
          curl -fsSL -X POST "${HOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"source":"distribution-registry","commit":"${{ github.sha }}"}' \
          && echo "Deploy hook fired." \
          || (echo "Deploy hook failed."; exit 1)
