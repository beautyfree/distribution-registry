name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: validate + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install script deps
        working-directory: scripts
        run: bun install --frozen-lockfile || bun install

      - name: Run schema + reachability validation
        run: bun run scripts/validate.ts

      - name: Run tests
        run: bun test tests/

  publish-index:
    name: publish index.json
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install script deps
        working-directory: scripts
        run: bun install --frozen-lockfile || bun install
      - name: Regenerate index.json (no fetch — already validated)
        run: bun run scripts/validate.ts --no-fetch
      - name: Commit if index.json changed
        run: |
          if git diff --quiet index.json; then
            echo "index.json unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore: regenerate index.json [skip ci]"
            git push
          fi

  deploy-hook:
    name: notify reader app
    needs: publish-index
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK_URL: ${{ secrets.REGISTRY_DEPLOY_HOOK }}
        run: |
          if [ -z "${HOOK_URL}" ]; then
            echo "REGISTRY_DEPLOY_HOOK secret not set — skipping."
            exit 0
          fi
          curl -fsSL -X POST "${HOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"source":"distribution-registry","commit":"${{ github.sha }}"}' \
          && echo "Deploy hook fired." \
          || (echo "Deploy hook failed."; exit 1)
